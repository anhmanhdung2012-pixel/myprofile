<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile & Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen">
        <div id="splash-particles"></div>
        <div class="splash-content">
            <div class="splash-rings">
                <div class="splash-ring"></div>
                <div class="splash-ring splash-ring--2"></div>
                <div class="splash-ring splash-ring--3"></div>
            </div>
            <p class="splash-welcome">✦ Chào mừng đến với ✦</p>
            <h1 class="splash-title">My Profile</h1>
            <p class="splash-sub">nhấp bất kỳ đâu để bước vào</p>
            <div class="splash-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <video loop muted playsinline class="background-overlay" id="bg-video"></video>
    <canvas id="snow-canvas"></canvas>
    <audio id="bg-music" loop></audio>

    <button class="volume-toggle" id="volume-btn">
        <i class="fas fa-volume-up"></i>
    </button>

    <div class="profile-container">
        <div class="avatar-wrapper">
            <img id="avatar-main" class="avatar-main" src="https://via.placeholder.com/150" alt="Avatar">
            <img id="avatar-decoration" class="avatar-decoration" src="" alt="" style="display:none">
        </div>

        <div id="username-main" class="title-name">Loading...</div>
        <div id="display-name" class="subtitle">loading...</div>

        <!-- CARD SLIDER (Discord / Roblox / YouTube) -->
        <div class="card-slider-wrapper">
            <div class="card-slider" id="card-slider">

                <!-- Card Discord -->
                <div class="slide-card uni-card">
                    <div class="uni-card-icon" id="discord-icon-wrap">
                        <i class="fab fa-discord"></i>
                    </div>
                    <div class="uni-card-info">
                        <div class="uni-card-platform">Discord</div>
                        <div class="uni-card-name" id="card-title">Loading...</div>
                        <div class="uni-card-handle" id="card-handle"></div>
                        <div class="uni-card-sub" id="card-subtext">Đang kết nối...</div>
                        <div class="uni-card-desc" id="card-desc"></div>
                    </div>
                    <span id="bot-status-dot" class="status-dot offline"></span>
                </div>

                <!-- Card Roblox -->
                <div class="slide-card uni-card">
                    <div class="uni-card-icon" id="roblox-icon-wrap">
                        <img src="https://cdn.cdnlogo.com/logos/r/4/roblox.svg" alt="Roblox" style="width:26px;height:26px;filter:brightness(0) invert(1)">
                    </div>
                    <div class="uni-card-info">
                        <div class="uni-card-platform">Roblox</div>
                        <div class="uni-card-name" id="roblox-name">Tên Roblox</div>
                        <div class="uni-card-handle" id="roblox-handle"></div>
                        <div class="uni-card-sub" id="roblox-sub">Đang tải...</div>
                        <div class="uni-card-desc" id="roblox-desc"></div>
                    </div>
                    <span id="roblox-status-dot" class="status-dot offline"></span>
                </div>

                <!-- Card YouTube -->
                <div class="slide-card uni-card">
                    <div class="uni-card-icon" id="yt-icon-wrap">
                        <i class="fab fa-youtube"></i>
                    </div>
                    <div class="uni-card-info">
                        <div class="uni-card-platform">YouTube</div>
                        <div class="uni-card-name" id="yt-name">Tên kênh</div>
                        <div class="uni-card-handle" id="yt-handle"></div>
                        <div class="uni-card-sub" id="yt-sub">Đang tải...</div>
                        <div class="uni-card-desc" id="yt-desc"></div>
                    </div>
                </div>

            </div>
            <!-- Chấm điều hướng -->
            <div class="slider-dots" id="slider-dots">
                <span class="slider-dot active" data-index="0"></span>
                <span class="slider-dot" data-index="1"></span>
                <span class="slider-dot" data-index="2"></span>
            </div>
        </div>

        <div class="social-icons">
            <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://discord.com" target="_blank"><i class="fab fa-discord"></i></a>
        </div>

        <div class="music-player">
            <div class="music-icon"><i class="fas fa-music"></i></div>
            <div class="track-info">
                <span id="track-name">Loading track...</span>
                <span id="track-time" style="font-size: 0.7rem; color: #aaa;">0:00 / 0:00</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar" style="width: 0%;"></div>
            </div>
            <div class="player-controls">
                <i class="fas fa-step-backward"></i>
                <i id="play-btn" class="fas fa-play"></i>
                <i class="fas fa-step-forward"></i>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
